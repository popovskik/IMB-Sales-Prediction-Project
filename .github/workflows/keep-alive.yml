name: keep-alive

# Ping the Railway API every 30 minutes so the service doesn't cold-sleep
# between grading visits. Uses a simple curl; failure is logged but not fatal.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            https://imb-sales-prediction-project-production.up.railway.app/health)
          echo "HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: health check returned $STATUS (service may be cold-starting)"
          fi
