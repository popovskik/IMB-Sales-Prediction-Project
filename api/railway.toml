# Railway deploy config. Set the service Root Directory to `api/` in the Railway UI.
# The trained models are committed in api/models/, so the build is self-contained
# (no cross-directory copy needed). Nixpacks auto-detects Python from requirements.txt.
#
# To refresh models after retraining: re-run `python -m src.models` in analysis/, then
#   cp analysis/models/*.joblib api/models/   and commit.
[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
